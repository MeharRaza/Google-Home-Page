<!DOCTYPE html>
<html>
<head>
    <title>Google</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        
        /* Top Links */
        .top-links {
            text-align: right;
            padding: 20px;
        }
        
        .top-links a {
            margin-left: 15px;
            color: #333;
            text-decoration: none;
        }
        
        .top-links a:hover {
            text-decoration: underline;
        }
        
        /* Google Logo */
        .logo {
            margin-top: 100px;
            margin-bottom: 30px;
        }
        
        .logo span {
            font-size: 80px;
            font-weight: bold;
        }
        
        .blue { color: #4285f4; }
        .red { color: #ea4335; }
        .yellow { color: #fbbc05; }
        .green { color: #34a853; }
        
        /* Search Box */
        .search-box {
            width: 500px;
            margin: 0 auto;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
        }
        
        .search-box:hover {
            box-shadow: 0 0 5px #ccc;
        }
        
        /* Buttons */
        .buttons {
            margin-top: 30px;
        }
        
        .btn {
            padding: 10px 20px;
            margin: 5px;
            border: 1px solid #f8f9fa;
            background: #f8f9fa;
            color: #3c4043;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .btn:hover {
            border: 1px solid #ccc;
        }
        
        /* Footer */
        .footer {
            background: #f2f2f2;
            position: absolute;
            bottom: 0;
            width: 100%;
            text-align: left;
            padding: 15px;
            color: #70757a;
        }
        
        .footer-links {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        .footer-links a {
            color: #70757a;
            text-decoration: none;
            margin-right: 20px;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Top Links -->
    <div class="top-links">
        <a href="#">Gmail</a>
        <a href="#">Images</a>
        <a href="#">☰</a>
    </div>
    
    <!-- Logo -->
    <div class="logo">
        <span class="blue">G</span>
        <span class="red">o</span>
        <span class="yellow">o</span>
        <span class="blue">g</span>
        <span class="green">l</span>
        <span class="red">e</span>
    </div>
    
    <!-- Search Box -->
    <input type="text" class="search-box" placeholder="Search Google or type a URL">
    
    <!-- Buttons -->
    <div class="buttons">
        <button class="btn">Google Search</button>
        <button class="btn">I'm Feeling Lucky</button>
    </div>
    
    <!-- Footer -->
    <div class="footer">
        <div>India</div>
        <div class="footer-links">
            <div>
                <a href="#">About</a>
                <a href="#">Advertising</a>
                <a href="#">Business</a>
                <a href="#">How Search works</a>
            </div>
            <div>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </div>
</body>
</html>
